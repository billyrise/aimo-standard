name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: v
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "ver=$VER" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Lint & Test
        run: |
          python tooling/checks/lint_i18n.py
          python tooling/checks/lint_schema.py
          pytest -q

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy version snapshot to gh-pages (VER -> latest alias)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mike deploy "${{ steps.v.outputs.ver }}" latest --update-aliases --push
          mike set-default latest --push

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp -r schemas templates examples validator docs mkdocs.yml README.md LICENSE.txt NOTICE.txt TRADEMARKS.md VERSIONING.md GOVERNANCE.md SECURITY.md dist/ || true
          (cd dist && zip -r "AIMO-Standard_${{ steps.v.outputs.tag }}_artifacts.zip" .)

      - name: Checksums
        run: |
          cd dist
          sha256sum "AIMO-Standard_${{ steps.v.outputs.tag }}_artifacts.zip" > "AIMO-Standard_${{ steps.v.outputs.tag }}_artifacts.zip.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.v.outputs.tag }}"
          files: |
            dist/AIMO-Standard_${{ steps.v.outputs.tag }}_artifacts.zip
            dist/AIMO-Standard_${{ steps.v.outputs.tag }}_artifacts.zip.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/AIMO-Standard_${{ steps.v.outputs.tag }}_artifacts.zip
            dist/AIMO-Standard_${{ steps.v.outputs.tag }}_artifacts.zip.sha256
