name: deploy-docs

on:
  workflow_run:
    workflows: ["quality-gate"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    # Only deploy if quality-gate succeeded and it was a push (not PR)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Build documentation
        run: python -m mkdocs build --strict

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Deploy main branch as 'latest' with 'dev' as alias
      # This ensures language switcher links use /latest/ (not /dev/)
      - name: Deploy current to gh-pages (latest + dev in sync)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin gh-pages:gh-pages || true
          # Remove existing 'dev' version if it exists (to convert to alias)
          mike delete dev --push 2>/dev/null || true
          # Deploy as 'latest' (primary) with 'dev' as alias
          mike deploy latest dev --update-aliases --push
          mike set-default latest --push

      - name: Ensure CNAME for custom domain (standard.aimoaas.com)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin gh-pages:gh-pages || true
          git checkout gh-pages
          echo "standard.aimoaas.com" > CNAME
          git add CNAME
          if git diff --cached --quiet; then
            echo "CNAME unchanged; nothing to commit."
          else
            git commit -m "chore(pages): ensure CNAME for standard.aimoaas.com"
            git push origin gh-pages
          fi
          git checkout -
